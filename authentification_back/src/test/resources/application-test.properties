spring.datasource.url=jdbc:h2:mem:tp1test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Verrouillage assez long pour que la 6e tentative soit encore sous verrou ; délai plus long avant déverrouillage (test lockout).
app.auth.lock-duration=3s
app.auth.max-failed-attempts=5
app.auth.challenge-ttl=5m

logging.file.name=logs/test-authentification.log
