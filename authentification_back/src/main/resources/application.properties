spring.application.name=authentification_back

# TP2 — lockout
app.auth.lock-duration=2m
app.auth.max-failed-attempts=5
# TP3 — fenêtre timestamp (± secondes), TTL nonce en base
app.auth.timestamp-skew-seconds=60
app.auth.nonce-ttl-seconds=120
# --- TP4 : Master Key ---
# Sans APP_MASTER_KEY, Spring ne peut pas créer PasswordEncryptionService → l'application ne démarre pas.
# Ne pas mettre la vraie clé ici : utiliser l'environnement (IDE, Docker, systemd, etc.).
# Exemple PowerShell : $env:APP_MASTER_KEY = "cle-longue-aleatoire"

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/authentification?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=X9!mQ@7ZA2^kP$R4&F8sLwEJ*H

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

logging.file.name=logs/authentification.log
logging.level.com.example.authentification_back=INFO

server.port=8080
